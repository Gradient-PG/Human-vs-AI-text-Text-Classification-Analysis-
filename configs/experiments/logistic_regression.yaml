experiment_name: logistic_regression
random_state: 42

# Component references
tokenizer: bert
encoder: bert
classifier: logistic_regression

# Data settings
dataset:
  name: AI_Human
  file: AI_Human.csv
  text_column: text
  label_column: generated
  test_size: 0.2

# Training settings
training:
  batch_size: 64
  epochs: 1
  eval_every: 50

# Paths
paths:
  raw_data: data/raw
  processed_data: data/processed
  models: models
  results: results

