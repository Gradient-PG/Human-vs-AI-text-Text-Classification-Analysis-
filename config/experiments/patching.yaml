experiment: patching
source_experiment: sparse_probe

evaluator: patching
evaluator_params:
  pairing: same_domain
  # k=100, 200 dropped: C=0.005 at N=7500 selects ~80 features per fold,
  # so high-k points would collapse to k=-1 (full selected set).
  k_values: [1, 2, 5, 10, 20, 50, -1]
  n_shuffles: 20
  n_random_draws: 20

n_folds: 5
seeds: [42, 123, 456]
max_samples: 7500
stability_threshold: 0.8
eval_probe_C: 1.0
eval_probe_max_iter: 5000

activations_root: results
output_dir: results/experiments
