classifier: sgd
classifier_config:
  params:
    loss: hinge
    max_iter: 1000
    random_state: 42
  type: sklearn.linear_model.SGDClassifier
dataset:
  file: AI_Human.csv
  label_column: generated
  name: AI_Human
  test_size: 0.2
  text_column: text
encoder: bert
